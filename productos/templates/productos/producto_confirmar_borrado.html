{% extends "base.html" %}

{% block titulo %}Eliminar producto{% endblock %}

{% block contenido %}
<h2>Eliminar producto</h2>

<p>¿Seguro que deseas eliminar <strong>{{ producto.nombre }}</strong>?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn danger">Sí, eliminar</button>
</form>

<a href="{% url 'producto_detalle' producto.pk %}">Cancelar</a>
{% endblock %}
